"""Alembic migrations for insurance fraud database.

Usage:
    alembic upgrade head      # Apply all migrations
    alembic downgrade -1     # Rollback last migration
    alembic revision --autogenerate  # Create new migration
"""

from alembic import context
from sqlalchemy import create_engine, Column, Integer, String, Float, DateTime, Text
from sqlalchemy.ext.declarative import declarative_base
from sqlalchemy.sql import func
import os

# Import config
from config.settings import DATABASE_URL

# this is the Alembic Config object
config = context.config

# Set sqlalchemy.url from config settings
config.set_main_option("sqlalchemy.url", DATABASE_URL.replace("+psycopg2", ""))

Base = declarative_base()


class Claim(Base):
    """Claims table model."""
    __tablename__ = "claims"
    
    id = Column(Integer, primary_key=True)
    months_as_customer = Column(Integer)
    age = Column(Integer)
    policy_number = Column(String(50), unique=True)
    policy_state = Column(String(10))
    policy_csl = Column(String(20))
    policy_deductable = Column(Integer)
    policy_annual_premium = Column(Float)
    insured_sex = Column(String(10))
    insured_education_level = Column(String(20))
    insured_occupation = Column(String(50))
    capital_gains = Column(Float)
    capital_loss = Column(Float)
    incident_type = Column(String(50))
    collision_type = Column(String(20))
    incident_severity = Column(String(20))
    incident_hour_of_the_day = Column(Integer)
    number_of_vehicles_involved = Column(Integer)
    property_damage = Column(String(10))
    bodily_injuries = Column(Integer)
    witnesses = Column(Integer)
    police_report_available = Column(String(10))
    total_claim_amount = Column(Float)
    injury_claim = Column(Float)
    property_claim = Column(Float)
    vehicle_claim = Column(Float)
    auto_make = Column(String(30))
    auto_year = Column(Integer)
    has_claim = Column(Integer)
    age_group = Column(String(20))
    tenure_group = Column(String(20))
    is_fraud = Column(Integer)
    created_at = Column(DateTime, server_default=func.now())
    updated_at = Column(DateTime, server_default=func.now(), onupdate=func.now())


def run_migrations_offline():
    """Run migrations in 'offline' mode."""
    url = config.get_main_option("sqlalchemy.url")
    context.configure(
        url=url,
        target_base=Base,
        literal_binds=True,
        dialect_opts={"paramstyle": "named"},
    )
    
    with context.begin_transaction():
        context.run_migrations()


def run_migrations_online():
    """Run migrations in 'online' mode."""
    connectable = create_engine(DATABASE_URL)
    
    with connectable.connect() as connection:
        context.configure(
            connection=connection,
            target_base=Base,
        )
        
        with context.begin_transaction():
            context.run_migrations()


if context.is_offline_mode():
    run_migrations_offline()
else:
    run_migrations_online()
