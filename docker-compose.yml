version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: morocco_re_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: morocco_re
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morocco_re_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: morocco_re
      DB_USER: postgres
      DB_PASSWORD: postgres
      ENV: prod
    volumes:
      - ./data:/app/data

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morocco_re_prefect_worker
    command: prefect worker start --pool dev-etl
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - prefect_data:/root/.prefect

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    container_name: morocco_re_prefect
    command: prefect server start
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

volumes:
  postgres_data:
  prefect_data:
